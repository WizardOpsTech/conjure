version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: conjure
    main: ./main.go
    binary: conjure
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: conjure
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - typo
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance Improvements
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: WizardOpsTech
    name: conjure
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Conjure {{ .Version }} ({{ .Date }})

    Welcome to this new release of Conjure!
  footer: |
    ## Installation

    ### One-line install (Linux & macOS)

    ```bash
    curl -sfL https://raw.githubusercontent.com/WizardOpsTech/conjure/main/install.sh | sh
    ```

    ### One-line install (Windows PowerShell)

    ```powershell
    irm https://raw.githubusercontent.com/WizardOpsTech/conjure/main/install.ps1 | iex
    ```

    ### Manual binary download

    Download the archive for your platform from the assets below, extract it, and move the binary to a directory on your PATH.

    | Platform | Archive |
    |---|---|
    | Linux x86_64 | `conjure_{{ .Version }}_Linux_x86_64.tar.gz` |
    | Linux arm64 | `conjure_{{ .Version }}_Linux_arm64.tar.gz` |
    | macOS Intel | `conjure_{{ .Version }}_Darwin_x86_64.tar.gz` |
    | macOS Apple Silicon | `conjure_{{ .Version }}_Darwin_arm64.tar.gz` |
    | Windows x86_64 | `conjure_{{ .Version }}_Windows_x86_64.zip` |

    ---

    **Full Changelog**: https://github.com/WizardOpsTech/conjure/compare/{{ .PreviousTag }}...{{ .Version }}
