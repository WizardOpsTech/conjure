version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: conjure
    main: ./main.go
    binary: conjure
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: conjure
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - typo
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance Improvements
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: thesudoYT
    name: conjure
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Conjure {{ .Tag }} ({{ .Date }})

    Welcome to this new release of Conjure!
  footer: |
    ## Installation

    ### Binary Installation

    Download the appropriate binary for your platform from the assets below.

    ### Quick Install Script (Linux/macOS)

    ```bash
    # Linux
    curl -L https://github.com/thesudoYT/conjure/releases/download/{{ .Tag }}/conjure_{{ .Tag }}_Linux_x86_64.tar.gz | tar xz
    sudo mv conjure /usr/local/bin/

    # macOS (Intel)
    curl -L https://github.com/thesudoYT/conjure/releases/download/{{ .Tag }}/conjure_{{ .Tag }}_Darwin_x86_64.tar.gz | tar xz
    sudo mv conjure /usr/local/bin/

    # macOS (Apple Silicon)
    curl -L https://github.com/thesudoYT/conjure/releases/download/{{ .Tag }}/conjure_{{ .Tag }}_Darwin_arm64.tar.gz | tar xz
    sudo mv conjure /usr/local/bin/
    ```

    ### Windows

    Download the ZIP file, extract it, and add the executable to your PATH.

    ---

    **Full Changelog**: https://github.com/thesudoYT/conjure/compare/{{ .PreviousTag }}...{{ .Tag }}
